                    </div>

                    <div class="control-buttons">

                            </svg>

                            </svg>

                        <button class="audio-main-btn" onclick="nextTrack()" title="Siguiente">

                                <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" />
                            </svg>
                        </button>

                    <div class="volume-control"
                        style="width: 200px; display: flex; align-items: center; gap: 1rem; margin-top: 1rem;">
                        <svg width="20" height="20" fill="#666" viewBox="0 0 24 24">

                    </div>
                </div>
            </section>
